services:
  - type: web
    name: inventory-management
    runtime: docker
    repo: https://github.com/yourusername/InventoryManagement
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: DATABASE_HOST
        fromDatabase:
          name: inventory-db
          property: host
      - key: DATABASE_NAME
        fromDatabase:
          name: inventory-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: inventory-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: inventory-db
          property: password

databases:
  - name: inventory-db
    plan: free
    databaseName: InventoryManagement
    user: inventory_user