services:
  - type: web
    name: inventory-management
    runtime: docker
    repo: https://github.com/kazi-s/InventoryManagement
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: PGHOST
        fromDatabase:
          name: inventory-db
          property: host
      - key: PGDATABASE
        fromDatabase:
          name: inventory-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: inventory-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: inventory-db
          property: password
      - key: PGPORT
        fromDatabase:
          name: inventory-db
          property: port

databases:
  - name: inventory-db
    plan: free
    databaseName: inventorymanagement
    user: inventory_user